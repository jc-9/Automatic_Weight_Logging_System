# BLE Scale Sync — config.yaml
# Generated by: npm run setup
#
# WARNING: This file may contain sensitive data (passwords, tokens).
# Use ${ENV_VAR} references for secrets (resolved from .env at load time).
#
# Validate: npm run validate
# Edit:     npm run setup (edit mode)

version: 1
scale:
  weight_unit: lbs
  height_unit: cm
unknown_user: nearest
ble:
  handler: auto
  scale_mac: FF:04:00:1D:73:07
users:
  - name: j
    slug: j
    height: 999
    birth_date: 1111-11-11
    gender: male
    is_athlete: false
    weight_range:
      min: 1
      max: 1000
    last_known_weight: null
global_exporters:
  - type: console
    url: json
runtime:
  continuous_mode: true
  scan_cooldown: 10
  dry_run: false
  debug: true
  watchdog_max_consecutive_failures: 10
  watch_config: true
